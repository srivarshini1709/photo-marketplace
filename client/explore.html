<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Photos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <h1 class="logo">PhotoMarket</h1>
    </nav>
  </header>

  <section class="explore-section">

    <h2>Explore Photos</h2>

    <input
      type="text"
      class="search-box"
      placeholder="Search photos..."
    >

    <div class="gallery">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e">

        <div class="card-content">
          <h3>Beach</h3>
          <button>Buy ₹99</button>
        </div>
      </div>

    </div>

  </section>

</body>
</html>
